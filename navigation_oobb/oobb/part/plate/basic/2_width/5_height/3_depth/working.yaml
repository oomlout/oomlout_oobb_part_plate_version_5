oomlout_ai_roboclick_1:
  actions:
  - command: new_chat
    description: step_1_create_icon
  - command: ai_query
    delay: '120'
    mode_ai_wait: slow
    text: 'This is a context-loading and exploration step for a laser-cuttable mascot
      logo. Take your time and think expansively before answering. Explore multiple
      mascot directions, compare several line-art approaches, stress-test them for
      charm, readability, manufacturability, and overall polish, and explain everything
      that would be useful for the next step. The goal here is not brevity. The goal
      is to surface strong options, useful observations, and a well-reasoned direction
      for a square, single-colour, black-on-white mascot logo drawing that is charming,
      original, cute, polished, and instantly readable at small size.


      Creative direction:

      - Invent one central mascot concept based on the theme, but push beyond generic
      clip art. The mascot should feel witty, memorable, and slightly surprising while
      still being cute and simple.

      - Favor an adorable line-drawing character with a clear face, pose, and identity.
      Anthropomorphize only as much as needed for charm and readability.

      - Supporting elements and text are allowed and can be important when they help
      define the identity, dimensions, category, mood, or story of the logo.

      - Favor iconic themed props, symbols, labels, and shape cues over random decoration.
      Every element should help the logo read faster and feel more complete.

      - Think in stages before writing: concept search, line-language search, simplification,
      and final refinement. Prefer the idea that stays most legible after simplification.

      - Deliberately look for a concept that feels specific to the theme rather than
      generic kawaii branding.

      - Keep the cute details genuinely sweet and lovable: soft expressions, appealing
      proportions, simple cheeks, tiny hands or feet only if they help, and charming
      gesture choices.

      - Search for a direction that feels like a designed branded icon rather than
      a loose doodle page.

      - Make all parts of the image feel like they were designed by one illustrator
      in one visual family, with consistent shape logic, line language, facial styling,
      spacing, and proportion choices.

      - Favor rounded geometric simplification, clear negative space, gentle symmetry
      or balance where useful, and a visual hierarchy where the mascot leads and the
      supporting details and text reinforce.


      Format and manufacturing constraints:

      - Pure black artwork on a pure white background only.

      - No grey, no shading, no gradients, no halftones, no texture, no color, no
      transparency, and no background scene.

      - Prefer line drawing over large filled black areas. Use clean outlines and
      sparse interior detail instead of heavy solid shapes.

      - Design for laser cutting: lines should be confident and durable rather than
      hairline-thin; details should be simple; no dense crosshatching; and any islands
      should be connected if the design depends on physical continuity.

      - Keep the artwork centered in a square composition with comfortable margins
      and a clean airy overall read.

      - The drawing should feel cute, open, and light rather than dark, chunky, or
      posterized.

      - If text is used, it should be bold, simple, highly legible, and visually integrated
      with the illustration.

      - Border-like framing is allowed only if it strengthens the logo as a clean
      badge or label shape rather than making it feel boxed in.

      - Prioritize readability, cuteness, manufacturability, clarity, cohesion, and
      polish over detail.


      What to include in your response:

      - Several candidate mascot directions for the theme, with notes on why each
      could work.

      - Observations about line clarity, readability at small size, cuteness, and
      laser-cut safety.

      - Notes on what details should be simplified, merged, thickened, connected,
      or removed to keep the drawing light and appealing.

      - Suggestions for supporting motifs and text treatments only where they genuinely
      improve the idea.

      - Observations about what makes the composition feel polished, cohesive, brandable,
      and visually unified rather than random or clip-art-like.

      - A recommended direction, with an explanation of why it is strongest.

      - One strong final image-generation prompt at the end, ready for later use.


      Response style:

      - Explain your reasoning clearly and include all useful detail.

      - It is fine to use structure, bullets, short sections, and comparisons if that
      helps clarity.

      - The final prompt should explicitly say the image is square and black on white.

      '
  - command: ai_query
    delay: '120'
    mode_ai_wait: slow
    text: 'Now use the exploration work to develop the direction for this theme: an
      image of oobb part plate basic 2 width 5 height 3 depth make Oobb Part Plate
      Basic 2 Width 5 Height 3 Depth cute


      Take your time and search outward before narrowing down. Flesh the theme out
      beyond its obvious first interpretation. Explore multiple mascot angles, visual
      metaphors, poses, supporting motifs, text treatments, and line-drawing approaches,
      and explain what becomes more interesting, more readable, cuter, more cohesive,
      or more manufacturable as you develop the idea. Make it more creatively specific
      than the theme name alone while staying laser-cut safe.


      What to do:

      - Explore a healthy range of possible directions, not just the first few obvious
      ones.

      - Search for specific, memorable, and theme-native ideas rather than generic
      cute branding.

      - Compare different mascot interpretations, poses, prop choices, supporting
      motifs, and label or badge text treatments where relevant.

      - Compare different outline and interior-line strategies, especially ones that
      avoid large dark filled areas.

      - Discuss what helps or hurts the drawing at small size.

      - Call out what should be simplified, thickened, connected, merged, or removed
      for laser cutting.

      - Surface tradeoffs between charm, cuteness, clarity, uniqueness, and manufacturability.

      - Favor directions that feel sweet, lovable, and visually light. Avoid details
      that make the mascot feel fussy, stern, generic, or overdesigned.

      - Favor directions where the mascot, supporting details, and text feel like
      one designed system rather than separate assets placed next to each other.

      - Look for ways to make the composition feel more polished, premium, badge-like,
      and visually intentional without losing warmth.

      - Recommend the strongest direction only after the exploration feels well developed.

      - End with one polished final image-generation prompt paragraph for the recommended
      direction.


      Response style:

      - Explain everything that seems useful for the next step.

      - It is good to be expansive here; do not compress the thinking prematurely.

      - Structured notes, comparisons, bullets, and short sections are welcome if
      they help clarity.

      - The final prompt should explicitly say the image is square and black on white.

      '
